name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: Greet first-time contributors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const actor = context.payload.sender.login;
            const isIssue = !!context.payload.issue;
            const isPR    = !!context.payload.pull_request;

            // Skip the repo owner — no need to welcome yourself
            if (actor === owner) return;

            // Check contribution history on this repo
            let issueCount = 0;
            let prCount    = 0;

            try {
              const issues = await github.rest.issues.listForRepo({
                owner, repo,
                creator: actor,
                state: 'all',
                per_page: 2,
              });
              // GitHub issues endpoint returns PRs too; filter them
              issueCount = issues.data.filter(i => !i.pull_request).length;
              prCount    = issues.data.filter(i =>  i.pull_request).length;
            } catch (_) { /* ignore, still welcome */ }

            const isFirstIssue = isIssue && issueCount <= 1;
            const isFirstPR    = isPR    && prCount    <= 1;

            if (!isFirstIssue && !isFirstPR) return;

            let message;

            if (isFirstIssue) {
              message = `Hi @${actor}, thanks for opening your first issue on Overseer!

            We'll take a look as soon as possible. In the meantime:
            - Check the [README](https://github.com/${owner}/${repo}/blob/master/README.md) for usage and Procfile examples.
            - For questions or general discussion, [GitHub Discussions](https://github.com/${owner}/${repo}/discussions) is the best place.`;
            }

            if (isFirstPR) {
              message = `Hi @${actor}, thanks for your first pull request on Overseer!

            A few things to double-check before review:
            - Branch follows gitflow naming: \`feature/\`, \`bugfix/\`, \`hotfix/\`, or \`release/\`
            - \`go test ./...\` passes and \`gofmt\` has been run
            - \`CHANGELOG.md\` is updated for features and bug fixes

            We appreciate the contribution — we'll review it shortly!`;
            }

            if (!message) return;

            const number = isIssue
              ? context.payload.issue.number
              : context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: number,
              body: message,
            });
