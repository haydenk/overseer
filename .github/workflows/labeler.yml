name: Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  # ── Label PRs by changed files ───────────────────────────────────────────────
  label-pr:
    name: Label PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

  # ── Label issues by keywords in title/body ────────────────────────────────────
  label-issue:
    name: Label Issue
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body  = (context.payload.issue.body || '').toLowerCase();
            const text  = title + ' ' + body;

            const labels = [];

            if (/\b(procfile|process|worker|web|command)\b/.test(text))  labels.push('procfile');
            if (/\b(signal|sigterm|sigint|shutdown|graceful)\b/.test(text)) labels.push('signals');
            if (/\b(output|color|colour|prefix|timestamp|log)\b/.test(text)) labels.push('output');
            if (/\b(env|dotenv|\.env|environment|variable)\b/.test(text)) labels.push('configuration');
            if (/\b(port|formation|scale|instance)\b/.test(text))        labels.push('formation');
            if (/\b(doc|readme|changelog|comment)\b/.test(text))         labels.push('documentation');
            if (/\b(ci|cd|action|workflow|pipeline|release)\b/.test(text)) labels.push('ci/cd');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.issue.number,
                labels,
              });
            }
